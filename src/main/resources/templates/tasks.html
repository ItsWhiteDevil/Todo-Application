<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Todo Application</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <style>
            .text-strikethrough {
                text-decoration: line-through;
                color: gray;
            }
        </style>
    </head>
    <body>
        
        <div class="container">
            <h1 class="mt-5 text-center">Todo Application</h1>
            <form action="/" method="post" class="row mt-3">
                <div class="col-md-10">
                    <input class="form-control form-control-lg" type="text" name = "title" placeholder="Add new task.." required>
                </div>
                <div class="col-md-2">
                    <button type = "submit" class="btn btn-primary btn-lg btn-block">Add</button>
                </div>
            </form>
            <div class="mt-4">
                <th:block th:each="tasks :${tasks}">
                    <div class="card mb-2">
                        <div class = "card-body d-flex justify-content-between align-items-center">
                            <span th:classappend="${tasks.completed ? 'text-strikethrough' : ''}" th:text = "${tasks.title}"> Task Title</span>

                            <div>
                                <a th:href="@{/{id}/done(id=${tasks.id})}" class="btn btn-outline-secondary btn-sm">Done</a>
                                <a th:href="@{/{id}/update(id=${tasks.id})}" 
                                    th:data-title="${tasks.title}"
                                    onclick="
                                        let currentTitle = this.getAttribute('data-title');
                                        let newTitle = prompt('Edit task title:', currentTitle); 
                                        if (newTitle && newTitle.trim() !== '') { 
                                            this.href += '?title=' + encodeURIComponent(newTitle.trim()); 
                                            return true; 
                                        } 
                                        return false;" 
                                    class="btn btn-outline-primary btn-sm ms-2">Edit</a>
                                <a th:href="@{/{id}/delete(id=${tasks.id})}" class="btn btn-outline-danger btn-sm ml-2">Delete</a>
                            </div>
                        </div>
                    </div>
                </th:block>
            </div>
            
        </div>
    </body>
</html>
